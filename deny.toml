[advisories]
# SYNC NOTE — `deny.toml` vs `.cargo/audit.toml` (HONEST asymmetry,
# refreshed 2026-05-16 by health routine / PR health/202605161645):
#
#   * `audit.toml` controls vulnerabilities flagged by `cargo audit`
#     (the PR-time Security job uses `--deny unsound`, mirroring the
#     nightly `cargo-audit.yml` setup since GAR-453 made it blocking).
#   * `deny.toml` controls advisories flagged by `cargo deny check
#     advisories`. Now invoked in CI via `cargo-deny-action` default
#     `command: check` (since GAR-458 enabled the advisories category).
#   * **Mandatory sync (remaining mirrored IDs): RUSTSEC-2023-0071 (rsa /
#     GAR-456). Closed history: wasmtime-wasi ×1 (GAR-685 / PR #472),
#     wasmtime ×15 (GAR-454), webpki ×4
#     (GAR-455 / PR #295), lru ×1 (GAR-593 / health/202605121530),
#     instant ×1 (GAR-627 / health/202605150000),
#     rustls-pemfile ×1 (health/20260517 axum-server 0.8),
#     glib RUSTSEC-2024-0429 ×1 (health/20260523 — advisory-not-detected:
#     cargo deny advisory DB no longer matches glib 0.18.5; retained in
#     audit.toml. Drop from BOTH files when upstream fix lands).
#     rand RUSTSEC-2026-0097 ×1 FULLY CLOSED 2026-06-05 (health run 82 /
#     GAR-789 plan 0262) — rand 0.7.3 gone from Cargo.lock; removed from
#     audit.toml. deny.toml already clean since 2026-05-23.**
#   * The 17 unmaintained-only IDs (2 directly named: derivative,
#     proc-macro-error
#     + 10× gtk-rs + 5× unic-*) are intentionally NOT
#     mirrored in `audit.toml`. `cargo audit` auto-classifies them as
#     "allowed warnings" and does NOT require explicit ignore.
#     Mirroring them here in `deny.toml` is required because `cargo
#     deny` treats them as deny-by-default. Do not "fix" the asymmetry
#     by mass-mirroring to `audit.toml`; that would change runtime
#     behavior.
version = 2
yanked = "warn"
ignore = [
    # --- GAR-454 (CLOSED 2026-04-27) wasmtime 28 → 44 bump fechou os 15 IDs ---
    # Sessão `purrfect-lantern` bumped wasmtime 28.0.1 → 44.0.0 + wasmtime-wasi
    # 28 → 44 + wiggle 28 → 44 (transitive). `cargo deny check advisories` exit
    # 0 sem nenhum dos 15 IDs em ignore. Removidos atomicamente daqui e de
    # `.cargo/audit.toml` per o SYNC NOTE invariant: RUSTSEC-2025-0046, -0118,
    # RUSTSEC-2026-0020, -0021, -0085, -0086, -0087, -0088, -0089, -0091,
    # -0092, -0093, -0094, -0095 (CRITICAL CVSS 9.0), -0096 (CRITICAL CVSS 9.0).

    # --- rustls-webpki residual (GAR-455 CLOSED 2026-05-12) ---
    # Both legacy chains removed from Cargo.lock as of 2026-05-12:
    #   * 0.101.7 chain (aws-smithy): removed 2026-05-09 by plan 0087 / GAR-553.
    #   * 0.102.8 chain (serenity): removed 2026-05-12 by PR #293 / GAR-591
    #     (serenity feature flip rustls_backend → native_tls_backend).
    # Cargo.lock now contains only rustls-webpki 0.103.13. All 4 IDs dropped
    # atomically from deny.toml + audit.toml per SYNC NOTE invariant.
    # Removed: RUSTSEC-2026-0049, RUSTSEC-2026-0098, RUSTSEC-2026-0099, RUSTSEC-2026-0104.

    # --- Unmaintained-only — deny.toml-exclusive (no audit.toml mirror) ---
    # These crates have RUSTSEC `unmaintained` advisories but no fixed
    # version. `cargo audit` auto-allows them as warnings; `cargo deny`
    # would otherwise deny. Listed here so `cargo deny check advisories`
    # passes. Owners deferred — these will be addressed when their
    # downstream consumers are upgraded.
    # NOTE: RUSTSEC-2025-0069 (daemonize unmaintained) CLOSED 2026-05-17.
    # Resolution: replaced daemonize 0.5 with nix::unistd double-fork idiom
    # (health/202605171245-replace-daemonize-nix, plan 0142 / GAR-656).
    # nix 0.31.3 was already a transitive dep; libc was already a direct dep.
    "RUSTSEC-2024-0388", # derivative (transitive via poise/serenity)
    # NOTE: RUSTSEC-2025-0057 (fxhash unmaintained) CLOSED 2026-04-27.
    # Resolution: wasmtime 28.0.1 → 44.0.0 (GAR-454) removed fxhash from
    # Cargo.lock. advisory-not-detected in cargo deny. Removed from deny.toml.
    "RUSTSEC-2024-0370", # proc-macro-error (transitive, no maintained alt)
    # RUSTSEC-2026-0173: proc-macro-error2 v2.0.1 unmaintained. Author confirmed no
    # longer maintained (GnomedDev/proc-macro-error-2#17). No safe upgrade — both
    # the original (RUSTSEC-2024-0370) and this fork are now abandoned.
    # Pulled transitively via: aquamarine 0.6.0 → teloxide 0.17.0 → garraia-channels,
    # and validator_derive 0.20.0 → validator 0.20.0 → garraia-auth/config/telemetry/workspace.
    # Alternatives (manyhow, proc-macro2-diagnostics) require upstream crate updates.
    # Owner: GAR-817. Expiry: 2026-07-31. Re-evaluate when teloxide/validator upgrade.
    "RUSTSEC-2026-0173", # proc-macro-error2 (transitive via teloxide+validator, no fix)
    # NOTE: RUSTSEC-2025-0052 (async-std unmaintained) CLOSED 2026-06-01.
    # Resolution: opentelemetry_sdk 0.26 → 0.32 (garraia-telemetry plan 0252 / GAR-711).
    # opentelemetry_sdk >= 0.28 dropped async-std entirely. Removed from deny.toml.
    # NOTE: RUSTSEC-2025-0134 (rustls-pemfile unmaintained) CLOSED 2026-05-17.
    # Resolution: axum-server 0.7.3 → 0.8.0 (health routine PR
    # chore/sec-20260517-axum-server-0.8). axum-server 0.8 migrated to
    # rustls-pki-types, removing rustls-pemfile entirely from the lockfile.
    # Removed from BOTH deny.toml and audit.toml per SYNC NOTE invariant.

    # --- audit.toml mirrors that cargo-deny ALSO requires (vuln + unsound) ---
    # These IDs are in `.cargo/audit.toml` but cargo-deny categorizes them
    # differently than cargo-audit — `unsound` is deny-by-default in
    # cargo-deny, so we must mirror them here even though `cargo audit
    # --deny unsound` already covers them in the PR-time Security gate.
    # Local `cargo deny --offline check` does NOT reproduce these failures
    # because the local cargo-deny version's severity mapping differs from
    # the cargo-deny-action@v2 used in CI; the IDs are added defensively
    # to cover the empirical CI behavior.
    #
    # rsa 0.9.10 — Marvin Attack timing sidechannel. Mirror of audit.toml
    # under GAR-456. Pulled via sqlx-mysql lockfile leak (defense-in-depth
    # in PR-4 prevented runtime use). Expires 2026-07-31.
    "RUSTSEC-2023-0071",
    # NOTE: RUSTSEC-2024-0429 (glib 0.18.5 VariantStrIter unsound) — REMOVED
    # 2026-05-23 health run 19 / GAR-513. cargo deny advisory DB no longer
    # matches glib 0.18.5 for this ID (advisory-not-detected). cargo audit
    # still matches it; entry retained in audit.toml. Owner: GAR-513, expiry
    # 2026-07-31. Removed from deny.toml to eliminate advisory-not-detected
    # noise that could mask real alerts.
    # NOTE: RUSTSEC-2026-0002 (lru IterMut stacked-borrows) closed by
    # GAR-593 (2026-05-12). aws-sdk-s3 1.132.0 pulled lru 0.16.4 (patched).
    # Removed from BOTH audit.toml and deny.toml atomically (PR #297+this).
    # NOTE: RUSTSEC-2026-0037 (quinn-proto) closed by GAR-457 (2026-04-27)
    # via lockfile-only `cargo update -p quinn-proto --precise 0.11.14`.
    # Removed from BOTH audit.toml and deny.toml.

    # NOTE: RUSTSEC-2026-0097 (rand 0.7.3 thread_rng unsound) FULLY CLOSED.
    # Removed from deny.toml 2026-05-23 (health run 19 / GAR-513) —
    # advisory-not-detected (cargo deny DB no longer matches rand 0.7.3).
    # Removed from audit.toml 2026-06-05 (health run 82 / GAR-789 plan 0262)
    # — rand 0.7.3 gone from Cargo.lock (phf_generator switched to fastrand).
    # GAR-513 glib portion remains in audit.toml. Owner: GAR-513, expiry 2026-07-31.

    # --- gtk-rs unmaintained — desktop-only (10 IDs, expires 2026-07-31) ---
    # Pulled via tauri-runtime-wry → wry 0.54 → gtk 0.18 → atk/gdk/gtk3-macros
    # → garraia-desktop. CI excludes garraia-desktop (`--exclude garraia-desktop`)
    # so runtime risk on Linux server deploys is zero, but `cargo deny` walks
    # the full lockfile. Upstream gtk-rs GTK3 bindings discontinued; GTK4
    # migration is a Tauri-side decision. Owner: epic GAR-430.
    "RUSTSEC-2024-0411", # gdkwayland-sys
    "RUSTSEC-2024-0412", # gdk
    "RUSTSEC-2024-0413", # atk
    "RUSTSEC-2024-0414", # gdkx11-sys
    "RUSTSEC-2024-0415", # gtk
    "RUSTSEC-2024-0416", # atk-sys
    "RUSTSEC-2024-0417", # gdkx11
    "RUSTSEC-2024-0418", # gdk-sys
    "RUSTSEC-2024-0419", # gtk3-macros
    "RUSTSEC-2024-0420", # gtk-sys

    # --- unic-* unmaintained — open-i18n/rust-unic discontinued (5 IDs) ---
    # Pulled via tauri-utils 2.8 → urlpattern 0.3 → unic-ucd-ident → unic-*.
    # Tauri 2.x uses urlpattern for permission scope matching; replacement
    # depends on a Tauri or urlpattern crate update. Owner: GAR-430.
    # Expires 2026-07-31.
    "RUSTSEC-2025-0075", # unic-char-range
    "RUSTSEC-2025-0080", # unic-common
    "RUSTSEC-2025-0081", # unic-char-property
    "RUSTSEC-2025-0098", # unic-ucd-version
    "RUSTSEC-2025-0100", # unic-ucd-ident
]

