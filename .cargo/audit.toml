# cargo-audit configuration.
#
# Last cleanup: 2026-05-17 (health routine run 3 / GAR-657 — daemonize removed).
# Originally drafted: 2026-04-22 (plan 0043).
#
# Every entry in `ignore` is a REAL advisory against a dep in our
# Cargo.lock. These are deferred — not silenced — to a downstream
# Linear issue that owns the structural fix. Each block declares the
# advisory ID, the affected crate + version, runtime impact, the
# Linear issue that owns it, the available fix path (when known), and
# the expiration date that forces re-triage.
#
# Policy for adding a new ignore: (1) must reference a specific advisory
# ID, (2) must have a crate + rationale comment, (3) must have a
# concrete Linear issue as owner (not a "Lote" marker), (4) must declare
# fix availability honestly, (5) must have an expiration date.
#
# SYNC NOTE — `audit.toml` vs `deny.toml` (HONEST asymmetry,
# refreshed 2026-05-12 by health-routine / GAR-593):
#
#   * `audit.toml` controls vulnerabilities flagged by `cargo audit`.
#     It carries every RUSTSEC ID that would otherwise make `cargo audit`
#     exit non-zero on `Cargo.lock`.
#   * `deny.toml` controls advisories flagged by `cargo deny check
#     advisories` (now invoked in CI via cargo-deny-action default
#     `command: check`). It mirrors the same vuln/unsound IDs (rsa, glib,
#     rand) PLUS 19 `unmaintained-only` advisories that `cargo audit`
#     auto-classifies as "allowed warnings" and does NOT require
#     explicit ignore here.
#   * **Mandatory sync (remaining mirrored IDs): RUSTSEC-2023-0071 (rsa /
#     GAR-456). Drop atomically from BOTH files when the upstream fix lands.
#     Closed history: wasmtime ×15 (GAR-454),
#     webpki ×4 (GAR-455 / PR #295), lru ×1 (GAR-593 / this PR),
#     instant ×1 (GAR-627 / health/202605150000),
#     rustls-pemfile ×1 (health/20260517 — deny.toml-only, axum-server 0.8),
#     daemonize ×1 (health/202605171245 — deny.toml-only, PR #382 / GAR-656),
#     wasmtime-wasi ×1 (GAR-685 / health run 14, PR #472 — lockfile 44.0.2).**
#   * audit.toml-ONLY residuals (cargo audit matches; cargo deny does NOT —
#     removed from deny.toml 2026-05-23 to eliminate advisory-not-detected
#     noise): RUSTSEC-2024-0429 (glib / GAR-513),
#     RUSTSEC-2026-0097 (rand / GAR-513).
#   * The 21 unmaintained-only IDs in `deny.toml` (5 directly named +
#     10 gtk-rs + 5 unic-*) are intentionally NOT mirrored here. Do not
#     "fix" the asymmetry by mass-mirroring; that would change runtime
#     behavior of `cargo audit`.

[advisories]
ignore = [
    # =========================================================================
    # GAR-456 — sqlx-mysql lockfile leak (rsa Marvin Attack timing sidechannel)
    # =========================================================================
    # rsa 0.9.10 — Marvin Attack (timing sidechannel on RSA decrypt).
    # Status: ignore RETIDO honestamente. Defense-in-depth aplicado em
    # plan 0053 PR-4 (GAR-450, 2026-04-25): `default-features = false` em
    # todas as 5 declarações de sqlx, removendo `mysql` feature do active
    # tree. Mas o meta-crate upstream `sqlx 0.8.6` declara `sqlx-mysql`
    # como `optional = true` na sua dep section, então `cargo audit` walks
    # `Cargo.lock` e continua vendo `rsa 0.9.10` (transitivo).
    #
    # AMENDMENT 2026-04-30 (plan personal-api-key-revogada-vectorized-
    # matsumoto §Step 3): `jsonwebtoken 10 + rust_crypto` foi adotado para
    # destravar Dependabot PR #103. O backend `rust_crypto` traz `rsa
    # 0.9.10` para a árvore de produção do `garraia-auth` (segundo path de
    # entrada além do sqlx). A invariante de segurança permanece: o
    # GarraRUST emite e verifica APENAS HS256 (`Algorithm::HS256` em
    # crates/garraia-auth/src/jwt.rs), que usa hmac+sha2 do RustCrypto e
    # NÃO chama nenhum código RSA — o Marvin code path continua
    # não-reachable. Antes era "HS256 via ring"; agora é "HS256 via
    # hmac+sha2 RustCrypto". Mesma invariante, novo backend.
    #
    # Fix estrutural (em ordem de preferência):
    #   1. `jsonwebtoken` upstream isolar `rsa` atrás de uma feature
    #      "asymmetric" (não-default) — emitir issue lá quando relevante.
    #   2. Refactor para `sqlx-postgres` direto OU sqlx 0.9 (fecha o path
    #      sqlx-mysql).
    # Tracked by: GAR-456. Expires: 2026-07-31.
    "RUSTSEC-2023-0071",

    # =========================================================================
    # GAR-454 (CLOSED 2026-04-27) — wasmtime 28 → 44 bump fechou os 15 IDs
    # =========================================================================
    # Resolution: sessão `purrfect-lantern` bumped wasmtime 28.0.1 → 44.0.0
    # + wasmtime-wasi 28 → 44 + wiggle 28 → 44 (transitive). Empirical
    # verification:
    #   * `cargo audit --no-fetch --deny unsound` exit 0 — none of the 15
    #     IDs trigger any longer.
    #   * `cargo deny check advisories` flags every dropped ID as
    #     `advisory-not-detected: no crate matched advisory criteria`,
    #     confirming the wasmtime 28 chain is gone from `Cargo.lock`.
    # Removed atomically from this file AND `deny.toml` per the SYNC NOTE
    # invariant: RUSTSEC-2025-0046, -0118, RUSTSEC-2026-0020, -0021, -0085,
    # -0086, -0087, -0088, -0089, -0091, -0092, -0093, -0094, -0095
    # (CRITICAL CVSS 9.0), -0096 (CRITICAL CVSS 9.0).

    # =========================================================================
    # GAR-455 (CLOSED 2026-05-12) — rustls-webpki legacy chains fully removed
    # =========================================================================
    # Two-phase cleanup:
    #   1. plan 0087 (GAR-553, 2026-05-09, PR health/202605090047): swapped
    #      `aws-sdk-s3` feature `"rustls"` → `"default-https-client"`, removing
    #      `rustls-webpki 0.101.7` (3 of 4 IDs) from Cargo.lock.
    #   2. PR #293 (GAR-591, 2026-05-12): flipped serenity from `rustls_backend`
    #      to `native_tls_backend` (+ poise default-features=false), removing
    #      `rustls-webpki 0.102.8` / `rustls 0.22.4` / `tokio-rustls 0.25.0`
    #      entirely from Cargo.lock.
    #
    # Cargo.lock now carries ONLY `rustls-webpki 0.103.13` (the safe chain).
    # All 4 RUSTSEC IDs dropped atomically from BOTH audit.toml and deny.toml
    # per the SYNC NOTE invariant above.
    # Removed: RUSTSEC-2026-0049, RUSTSEC-2026-0098, RUSTSEC-2026-0099, RUSTSEC-2026-0104.

    # =========================================================================
    # GAR-513 carve-out — unsound warnings (glib + rand)
    # =========================================================================
    # GAR-437 (Q7 RUSTSEC triage) was marked Done 2026-04-27. Originally
    # 3 crates (glib, lru, rand); lru closed 2026-05-12 by GAR-593 when
    # aws-sdk-s3 1.132.0 pulled lru 0.16.4 (patched). 2 crates remain.
    # Without these ignores, the nightly `cargo audit --no-fetch --deny
