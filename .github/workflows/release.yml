name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.1.12)'
        required: false
        type: string

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

# Workflow-level default: read-only GITHUB_TOKEN. The `release` job overrides
# this with `contents: write` to upload artifacts via softprops/action-gh-release.
# Closes CodeQL rule `actions/missing-workflow-permissions` (Medium).
permissions:
  contents: read

jobs:
  # Build for Linux x86_64
  build-linux-x86_64:
    name: Build Linux x86_64
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release --package garraia

      - name: Package binary
        run: |
          mkdir -p release
          cp target/release/garra release/garraia-linux-x86_64
          chmod +x release/garraia-linux-x86_64

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: garraia-linux-x86_64
          path: release/garraia-linux-x86_64

  # Build for Linux ARM64
  build-linux-arm64:
    name: Build Linux ARM64
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cross
        run: cargo install cross

      - name: Build with cross
        run: cross build --release --target aarch64-unknown-linux-gnu --package garraia

      - name: Package binary
        run: |
          mkdir -p release
          cp target/aarch64-unknown-linux-gnu/release/garra release/garraia-linux-aarch64
          chmod +x release/garraia-linux-aarch64

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: garraia-linux-aarch64
          path: release/garraia-linux-aarch64

  # Build for Windows x86_64
  build-windows-x86_64:
    name: Build Windows x86_64
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release --package garraia

      - name: Package binary
        shell: bash
        run: |
          mkdir -p release
          cp target/release/garra.exe release/garraia-windows-x86_64.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: garraia-windows-x86_64
          path: release/garraia-windows-x86_64.exe

  # Build for macOS x86_64
  build-macos-x86_64:
    name: Build macOS x86_64
    runs-on: macos-13
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release --package garraia

      - name: Package binary
        run: |
          mkdir -p release
          cp target/release/garra release/garraia-macos-x86_64
          chmod +x release/garraia-macos-x86_64

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: garraia-macos-x86_64
          path: release/garraia-macos-x86_64

  # Build for macOS ARM64 (Apple Silicon)
  build-macos-arm64:
    name: Build macOS ARM64
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release --package garraia

      - name: Package binary
        run: |
          mkdir -p release
          cp target/release/garra release/garraia-macos-aarch64
          chmod +x release/garraia-macos-aarch64

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: garraia-macos-aarch64
          path: release/garraia-macos-aarch64

  # Create release
  release:
    name: Create Release
    # Wait for every build to settle, but only require x86_64 platforms to have
    # succeeded — ARM64 builds are best-effort while the openssl cross-compile
    # story is being sorted out. Without this guard a single ARM64 failure would
    # skip the release job entirely (which is what blocked v0.1.0-beta.1 and
    # v0.1.0-beta from ever shipping a Linux binary).
    needs:
      - build-linux-x86_64
      - build-linux-arm64
      - build-windows-x86_64
      - build-macos-x86_64
      - build-macos-arm64
    if: |
      always() &&
      needs.build-linux-x86_64.result == 'success' &&
      needs.build-windows-x86_64.result == 'success' &&
      needs.build-macos-x86_64.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Prepare binaries
        run: |
          set -euo pipefail
          mkdir -p release

          # Required (x86_64) — release job's `if:` already gated on these.
          cp artifacts/garraia-linux-x86_64/garraia-linux-x86_64 release/
          cp artifacts/garraia-windows-x86_64/garraia-windows-x86_64.exe release/
          cp artifacts/garraia-macos-x86_64/garraia-macos-x86_64 release/

          # Optional (aarch64) — included only if their build job succeeded and
          # uploaded an artifact. softprops/action-gh-release defaults
          # fail_on_unmatched_files to false, so missing entries in the `files:`
          # list below are silently skipped.
          if [ -f artifacts/garraia-linux-aarch64/garraia-linux-aarch64 ]; then
            cp artifacts/garraia-linux-aarch64/garraia-linux-aarch64 release/
          else
            echo "::warning ::Linux aarch64 binary not built; release will ship without it."
          fi
          if [ -f artifacts/garraia-macos-aarch64/garraia-macos-aarch64 ]; then
            cp artifacts/garraia-macos-aarch64/garraia-macos-aarch64 release/
          else
            echo "::warning ::macOS aarch64 binary not built; release will ship without it."
          fi

      - name: Get version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.version }}" != "" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/}
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION: $VERSION"

      - name: Generate checksums
        # Produces BOTH the aggregate SHA256SUMS (for human verification +
        # install.sh single-fetch) AND per-asset `<name>.sha256` files
        # consumed by `garraia update` (see crates/garraia-cli/src/update.rs:127
        # — it expects `<asset>.sha256` siblings). Without per-asset files the
        # auto-updater aborts with "release is missing checksum file".
        run: |
          set -euo pipefail
          cd release
          : > SHA256SUMS
          for f in *; do
            # Skip the SHA256SUMS file itself and any pre-existing .sha256 files
            # so a re-run never recursively hashes its own output.
            case "$f" in
              SHA256SUMS|*.sha256) continue ;;
            esac
            sha256sum "$f" | tee -a SHA256SUMS > "${f}.sha256"
          done
          echo "--- SHA256SUMS ---"
          cat SHA256SUMS
          echo "--- per-asset .sha256 files ---"
          ls -1 *.sha256

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          name: Release ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, 'alpha') || contains(steps.version.outputs.VERSION, 'beta') || contains(steps.version.outputs.VERSION, 'rc') }}
          generate_release_notes: true
          # `softprops/action-gh-release` uses glob expansion on this list, so
          # `*.sha256` covers every per-asset checksum (5 expected; missing
          # aarch64 builds simply contribute fewer matches). `fail_on_unmatched_files`
          # defaults to false, so a missing optional binary still ships the
          # release with what we have.
          files: |
            release/garraia-linux-x86_64
            release/garraia-linux-aarch64
            release/garraia-windows-x86_64.exe
            release/garraia-macos-x86_64
            release/garraia-macos-aarch64
            release/SHA256SUMS
            release/*.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
